name: Build and Push Docker Image

# Trigger model: tag push only.
#
# Rationale — release artifacts should publish exactly once per release event.
# scripts/release.sh refuses to run without polished release notes (EN + KO),
# so tag existence already implies "release is ready". Adding a main-branch
# push trigger would double-build the same release (main push + tag push
# arrive together) without adding meaningful artifacts.
#
# The :latest tag is automatically applied by docker/metadata-action's
# `flavor: latest=auto` — it follows the highest semver tag in this repo.
on:
  push:
    tags: ["v*"]
  # Manual escape hatch: rebuild a published tag or test workflow changes
  # without re-tagging.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or sha)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest=auto` (semver default) — only the highest non-prerelease
          # tag is promoted to :latest. Pre-releases like 0.2.0-rc.1 are
          # intentionally skipped, which is the correct behavior for users
          # tracking the moving :latest tag. During the 0.0.1-beta phase this
          # was temporarily `latest=true` so :latest stayed populated; reverted
          # at the v0.1.0 stable cut.
          # `type=semver,pattern={{major}}.{{minor}}` is enabled now that the
          # project ships stable versions — gives consumers a minor-pin alias
          # (e.g. `:0.1`) that auto-follows patch releases but stops at the
          # next minor bump. Skipped during 0.0.x-beta because metadata-action
          # emits no value for pre-release semver under this pattern.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Auto-Update:** Servers with Watchtower will automatically update within 5 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual Update:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'docker-compose pull && docker-compose up -d' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
